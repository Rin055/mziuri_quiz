version: "3.8"
services:
  web:
    build: .
    command: bash -c "python manage.py migrate --noinput && gunicorn project.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - project/.env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A project.celery worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - project/.env
    depends_on:
      - redis
      - web

  beat:
    build: .
    command: celery -A project.celery beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - project/.env
    depends_on:
      - redis
      - web